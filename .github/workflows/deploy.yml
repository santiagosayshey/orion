name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "stacks/**/compose.yml"
      - "stacks/**/compose.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed stacks
        id: changes
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD | grep -E "stacks/.*/compose\.ya?ml" | xargs -I{} dirname {} | sort -u)
          echo "stacks<<EOF" >> $GITHUB_OUTPUT
          echo "$changed" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        env:
          UNRAID_HOST: ${{ secrets.UNRAID_TAILSCALE_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $UNRAID_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync and deploy changed stacks
        env:
          UNRAID_HOST: ${{ secrets.UNRAID_TAILSCALE_HOST }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_PROJECT_DIR }}
        run: |
          while IFS= read -r stack; do
            [ -z "$stack" ] && continue
            echo "Syncing: $stack"
            ssh root@$UNRAID_HOST "mkdir -p ${COMPOSE_DIR}/${stack}"
            scp -r ${stack}/* root@$UNRAID_HOST:${COMPOSE_DIR}/${stack}/
            echo "Deploying: $stack"
            ssh root@$UNRAID_HOST "cd ${COMPOSE_DIR}/${stack} && docker compose pull && docker compose up -d --remove-orphans"
          done <<< "${{ steps.changes.outputs.stacks }}"

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STACKS: ${{ steps.changes.outputs.stacks }}
          STATUS: ${{ job.status }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.username || github.actor }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$STATUS" = "success" ]; then
            COLOR=2338586
            EMOJI="✅"
            TITLE="Deploy Successful"
          else
            COLOR=15876931
            EMOJI="❌"
            TITLE="Deploy Failed"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          AVATAR_URL="https://avatars.githubusercontent.com/${AUTHOR_NAME}"

          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/"/\\"/g')

          curl -s -H "Content-Type: application/json" \
            -d "{
              \"username\": \"GitHub Actions\",
              \"embeds\": [{
                \"color\": ${COLOR},
                \"author\": {
                  \"name\": \"${AUTHOR_NAME}\",
                  \"icon_url\": \"${AVATAR_URL}\"
                },
                \"title\": \"${EMOJI} ${TITLE}\",
                \"fields\": [
                  {
                    \"name\": \"Stack\",
                    \"value\": \"\`${STACKS}\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Commit\",
                    \"value\": \"[${SHORT_SHA}](${COMMIT_URL})\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Message\",
                    \"value\": \"${SAFE_MSG}\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Orion • GitHub Actions\",
                  \"icon_url\": \"https://github.githubassets.com/favicons/favicon-dark.png\"
                }
              }]
            }" \
            $WEBHOOK_URL