name: Lint

on:
  pull_request:
    paths:
      - "stacks/**/compose.yml"
      - "stacks/**/compose.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml stacks/