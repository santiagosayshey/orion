services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.5.6
    container_name: immich-server
    restart: unless-stopped
    ports:
      - "2283:2283"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/user/photos:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_PASSWORD=immich
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-redis
      - TZ=Australia/Adelaide
    depends_on:
      - immich-redis
      - immich-postgres
    labels:
        net.unraid.docker.webui: "http://[IP]:[PORT:2283]"

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/immich/model-cache:/cache
    environment:
      - TZ=Australia/Adelaide

  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=immich
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /mnt/user/appdata/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
