services:
  immich:
    image: ghcr.io/immich-app/immich-server:v2.5.6
    container_name: immich
    restart: unless-stopped
    ports:
      - "2283:2283"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/user/photos:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_PASSWORD=immich
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-redis
      - TZ=Australia/Adelaide
    depends_on:
      - immich-redis
      - immich-postgres
    networks:
      - default
      - gateway
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/immich-app/immich/main/design/immich-logo.png"
      net.unraid.docker.webui: "http://immich.orion"
      traefik.enable: "true"
      traefik.docker.network: "gateway"
      traefik.http.routers.immich.rule: "Host(`immich.orion`)"
      traefik.http.services.immich.loadbalancer.server.port: "2283"

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/immich/model-cache:/cache
    environment:
      - TZ=Australia/Adelaide
    labels:
        net.unraid.docker.icon: "https://raw.githubusercontent.com/immich-app/immich/main/design/immich-logo.png"

  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
    labels:
        net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/redis-light.png"

  immich-postgres:
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    labels:
        net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/postgresql.png"
    environment:
      - POSTGRES_PASSWORD=immich
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /mnt/user/appdata/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb

networks:
  gateway:
    external: true
