services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    user: "99:100"
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - /mnt/user/appdata/seerr:/app/config
    environment:
      - LOG_LEVEL=debug
      - TZ=Australia/Adelaide
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    networks:
      - media
      - gateway
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/seerr-team/seerr/develop/public/android-chrome-512x512.png"
      net.unraid.docker.webui: "http://seerr.orion"
      traefik.enable: "true"
      traefik.docker.network: "gateway"
      traefik.http.routers.seerr.rule: "Host(`seerr.orion`)"
      traefik.http.services.seerr.loadbalancer.server.port: "5055"

networks:
  media:
    external: true
  gateway:
    external: true