services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    volumes:
      - /mnt/user/appdata/prowlarr:/config
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Adelaide
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:prowlarr
      - TP_THEME=nord
    networks:
      - media
      - gateway
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/Prowlarr/Prowlarr/refs/heads/develop/Logo/1024.png"
      net.unraid.docker.webui: "http://prowlarr.orion"
      traefik.enable: "true"
      traefik.docker.network: "gateway"
      traefik.http.routers.prowlarr.rule: "Host(`prowlarr.orion`)"
      traefik.http.services.prowlarr.loadbalancer.server.port: "9696"

networks:
  media:
    external: true
  gateway:
    external: true