services:
  pihole:
    image: pihole/pihole:2026.02.0
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:80/tcp"
    volumes:
      - /mnt/user/appdata/pihole:/etc/pihole
    environment:
      - TZ=Australia/Adelaide
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD}
      - FTLCONF_dns_listeningMode=ALL
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      - gateway
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/pi-hole/graphics/master/Vortex/Vortex.png"
      net.unraid.docker.webui: "http://pihole.orion/admin"
      traefik.enable: "true"
      traefik.http.routers.pihole.rule: "Host(`pihole.orion`)"
      traefik.http.services.pihole.loadbalancer.server.port: "80"

  traefik:
    image: traefik:v3.6.9
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    environment:
      - TZ=Australia/Adelaide
    networks:
      - gateway
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/traefik/traefik/master/docs/content/assets/img/traefik.logo.png"
      net.unraid.docker.webui: "http://traefik.orion/dashboard/"
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: "Host(`traefik.orion`)"
      traefik.http.routers.traefik.service: "api@internal"

networks:
  gateway:
    name: gateway
