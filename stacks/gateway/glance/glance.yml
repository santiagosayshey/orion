server:
  port: 8080
  assets-path: /app/assets

theme:
  background-color: 240 8 9
  primary-color: 220 70 65
  contrast-multiplier: 1.1
  custom-css-file: /app/assets/custom.css

pages:
  - name: Homelab
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 12h

          - type: calendar
            first-day-of-week: monday

          - type: server-stats
            servers:
              - type: local
                name: Orion

      - size: full
        widgets:
          - type: monitor
            title: Media Server
            cache: 1m
            sites:
              - title: Plex
                url: http://plex.orion
                link: http://plex.orion
                icon: di:plex
              - title: Immich
                url: http://immich.orion
                link: http://immich.orion
                icon: di:immich

          - type: monitor
            title: Media Management
            cache: 1m
            sites:
              - title: Radarr
                url: http://radarr.orion
                link: http://radarr.orion
                icon: di:radarr
              - title: Sonarr
                url: http://sonarr.orion
                link: http://sonarr.orion
                icon: di:sonarr
              - title: Prowlarr
                url: http://prowlarr.orion
                link: http://prowlarr.orion
                icon: di:prowlarr
              - title: Profilarr
                url: http://profilarr.orion
                link: http://profilarr.orion
                icon: https://raw.githubusercontent.com/Dictionarry-Hub/profilarr/refs/heads/v2/src/lib/client/assets/logo-512.png
              - title: Seerr
                url: http://seerr.orion
                link: http://seerr.orion
                icon: di:overseerr

          - type: monitor
            title: Downloads
            cache: 1m
            sites:
              - title: Qui
                url: http://qui.orion
                link: http://qui.orion
                icon: di:qui
              - title: qBittorrent
                url: http://192.168.8.239:8080
                link: http://192.168.8.239:8080
                icon: di:qbittorrent
              - title: Tracearr
                url: http://tracearr.orion
                link: http://tracearr.orion
                icon: https://tracearr.com/images/logo-transparent.png

          - type: monitor
            title: Infrastructure
            cache: 1m
            sites:
              - title: Pi-hole
                url: http://pihole.orion/admin
                link: http://pihole.orion/admin
                icon: di:pi-hole
              - title: Traefik
                url: http://traefik.orion/dashboard/
                link: http://traefik.orion/dashboard/
                icon: di:traefik
              - title: Glance
                url: http://home.orion
                link: http://home.orion
                icon: di:glance
              - title: unRAID
                url: http://unraid.orion
                link: http://unraid.orion
                icon: di:unraid
              - title: GL.iNet Flint 2
                url: http://192.168.8.1
                link: http://192.168.8.1
                icon: https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/f4/49/d1/f449d152-1812-08f4-f5c5-471e5f971db8/AppIcon-0-0-1x_U007emarketing-0-11-0-0-85-220.png/400x400ia-75.webp
              - title: Tailscale
                url: https://login.tailscale.com/admin/machines
                link: https://login.tailscale.com/admin/machines
                icon: si:tailscale

