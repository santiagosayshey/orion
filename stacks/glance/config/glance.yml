server:
  port: 8080
  proxied: true
  assets-path: /app/config/assets

theme:
  custom-css-file: /assets/custom.css
  primary-color: 193 70 60
  negative-color: 354 42 56
  contrast-multiplier: 1.1
  disable-picker: true

pages:
  - name: Orion
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 24h
          - type: calendar
            first-day-of-week: monday
          - type: custom-api
            cache: 1h
            title: Speedtest
            title-url: http://speedtest.orion
            url: http://speedtest-tracker/api/v1/results/latest
            headers:
              Authorization: Bearer ${SPEEDTEST_TRACKER_API_TOKEN}
              Accept: application/json
            subrequests:
              stats:
                url: http://speedtest-tracker/api/v1/stats
                headers:
                  Authorization: Bearer ${SPEEDTEST_TRACKER_API_TOKEN}
                  Accept: application/json
            options:
              showPercentageDiff: true
            template: |
              {{ $showPercentage := .Options.BoolOr "showPercentageDiff" true }}
              {{ $stats := .Subrequest "stats" }}
              <div class="flex justify-between text-center margin-block-3">
              <div>
                  {{ $downloadChange := percentChange (.JSON.Float "data.download_bits") ($stats.JSON.Float "data.download.avg_bits") }}
                  {{ if $showPercentage }}
                  <div class="size-small {{ if gt $downloadChange 0.0 }}color-positive{{ else if lt $downloadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}" style="display: inline-flex; align-items: center;">
                  {{ $downloadChange | printf "%+.1f%%" }}
                  {{ if gt $downloadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;">
                      <path fill-rule="evenodd" d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z" clip-rule="evenodd" />
                  </svg>
                  {{ else if lt $downloadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;">
                      <path fill-rule="evenodd" d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                  </svg>
                  {{ end }}
                  </div>
                  {{ end }}
                  <div class="color-highlight size-h3">{{ .JSON.Float "data.download_bits" | mul 0.000001 | printf "%.1f" }}</div>
                  <div class="size-h6">DOWNLOAD</div>
              </div>
              <div>
                  {{ $uploadChange := percentChange (.JSON.Float "data.upload_bits") ($stats.JSON.Float "data.upload.avg_bits") }}
                  {{ if $showPercentage }}
                  <div class="size-small {{ if gt $uploadChange 0.0 }}color-positive{{ else if lt $uploadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}" style="display: inline-flex; align-items: center;">
                  {{ $uploadChange | printf "%+.1f%%" }}
                  {{ if gt $uploadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;">
                      <path fill-rule="evenodd" d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z" clip-rule="evenodd" />
                  </svg>
                  {{ else if lt $uploadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;">
                      <path fill-rule="evenodd" d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                  </svg>
                  {{ end }}
                  </div>
                  {{ end }}
                  <div class="color-highlight size-h3">{{ .JSON.Float "data.upload_bits" | mul 0.000001 | printf "%.1f" }}</div>
                  <div class="size-h6">UPLOAD</div>
              </div>
              <div>
                  {{ $pingChange := percentChange (.JSON.Float "data.ping") ($stats.JSON.Float "data.ping.avg") }}
                  {{ if $showPercentage }}
                  <div class="size-small {{ if gt $pingChange 0.0 }}color-negative{{ else if lt $pingChange 0.0 }}color-positive{{ else }}color-primary{{ end }}" style="display: inline-flex; align-items: center;">
                  {{ $pingChange | printf "%+.1f%%" }}
                  {{ if lt $pingChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;">
                      <path fill-rule="evenodd" d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                  </svg>
                  {{ else if gt $pingChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;">
                      <path fill-rule="evenodd" d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z" clip-rule="evenodd" />
                  </svg>
                  {{ end }}
                  </div>
                  {{ end }}
                  <div class="color-highlight size-h3">{{ .JSON.Float "data.ping" | printf "%.0f ms" }}</div>
                  <div class="size-h6">PING</div>
              </div>
              </div>
      - size: full
        widgets:
          - type: monitor
            title: Media Server
            cache: 1m
            sites:
              - title: Plex
                url: http://plex.orion
                check-url: http://192.168.8.239:32400
                icon: di:plex
                alt-status-codes:
                  - 401
              - title: Immich
                url: http://immich.orion
                check-url: http://immich:2283
                icon: di:immich
          - type: monitor
            title: Media Management
            cache: 1m
            sites:
              - title: Radarr
                url: http://radarr.orion
                check-url: http://radarr:7878
                icon: di:radarr
              - title: Sonarr
                url: http://sonarr.orion
                check-url: http://sonarr:8989
                icon: di:sonarr
              - title: Prowlarr
                url: http://prowlarr.orion
                check-url: http://prowlarr:9696
                icon: di:prowlarr
              - title: Profilarr
                url: http://profilarr.orion
                check-url: http://profilarr:6868
                icon: https://raw.githubusercontent.com/Dictionarry-Hub/profilarr/refs/heads/develop/src/lib/client/assets/logo-512.png
              - title: Seerr
                url: http://seerr.orion
                check-url: http://seerr:5055
                icon: di:overseerr
          - type: monitor
            title: Downloads
            cache: 1m
            sites:
              - title: Qui
                url: http://qui.orion
                check-url: http://qui:7476
                icon: di:qui
              - title: qBit1
                url: http://192.168.8.239:8080
                check-url: http://192.168.8.239:8080
                icon: di:qbittorrent
          - type: monitor
            title: Monitoring
            cache: 1m
            sites:
              - title: Speedtest
                url: http://speedtest.orion
                check-url: http://speedtest-tracker:80
                icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/speedtest-tracker.png
              - title: Tracearr
                url: http://tracearr.orion
                check-url: http://tracearr:3000
                icon: di:tracearr
          - type: monitor
            title: Gateway
            cache: 1m
            sites:
              - title: Traefik
                url: http://traefik.orion
                check-url: http://traefik.orion
                icon: di:traefik
              - title: GL.iNet Flint 2
                url: http://192.168.8.1
                check-url: http://192.168.8.1
                icon: https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/f4/49/d1/f449d152-1812-08f4-f5c5-471e5f971db8/AppIcon-0-0-1x_U007emarketing-0-11-0-0-85-220.png/400x400ia-75.webp

