services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - /mnt/user/appdata/sonarr:/config
      - /mnt/user/media:/media
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Adelaide
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:sonarr
      - TP_THEME=nord
    networks:
      - media
      - gateway
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/Sonarr/Sonarr/refs/heads/develop/Logo/1024.png"
      net.unraid.docker.webui: "http://sonarr.orion"
      traefik.enable: "true"
      traefik.docker.network: "gateway"
      traefik.http.routers.sonarr.rule: "Host(`sonarr.orion`)"
      traefik.http.services.sonarr.loadbalancer.server.port: "8989"

networks:
  media:
    external: true
  gateway:
    external: true